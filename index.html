<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>학교 옥상 태양광 발전 효율 시뮬레이터</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        body { font-family: 'Arial', sans-serif; background-color: #f4f7f6; margin: 0; padding: 20px; color: #333; }
        .container { max-width: 800px; margin: 0 auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h1, h2 { text-align: center; color: #2c3e50; }
        .panel { display: flex; justify-content: space-around; background: #eef2f3; padding: 20px; border-radius: 8px; margin-bottom: 20px; }
        button { background: #3498db; color: white; border: none; padding: 12px 24px; font-size: 16px; border-radius: 6px; cursor: pointer; transition: 0.3s; font-weight: bold; }
        button:hover { background: #2980b9; }
        button.sunny { background: #e67e22; } button.sunny:hover { background: #d35400; }
        button.cloudy { background: #7f8c8d; } button.cloudy:hover { background: #718093; }
        button.rainy { background: #2c3e50; } button.rainy:hover { background: #1a252f; }
        .chart-container { width: 100%; height: 400px; margin-top: 30px; }
    </style>
</head>
<body>

<div class="container">
    <h1>☀️ 학교 옥상 태양광 발전 분석 시뮬레이터</h1>
    <p style="text-align: center; color: #666;">전기전자공학과 수행평가 - 가상 날씨 환경 분석 및 탄소 배출 저감 통계</p>
    
    <div class="panel">
        <div>
            <h3>1. 현재 가상 날씨 선택</h3>
            <button class="sunny" onclick="generateSolarData('맑음', 250)">☀️ 맑음 (효율 고)</button>
            <button class="cloudy" onclick="generateSolarData('흐림', 80)">☁️ 흐림 (효율 중)</button>
            <button class="rainy" onclick="generateSolarData('비/눈', 15)">🌧️ 비/눈 (효율 저)</button>
        </div>
    </div>

    <div class="panel" style="background-color: #e8f8f5;">
        <div style="text-align: center;">
            <h3>📊 누적 통계 데이터 (Firebase 연동)</h3>
            <p>총 가동 횟수: <span id="total-count" style="font-weight: bold; color: #16a085;">0</span>회</p>
            <p>누적 발전량: <span id="total-power" style="font-weight: bold; color: #27ae60;">0</span> kWh</p>
            <p>이산화탄소($CO_2$) 감축량: <span id="total-co2" style="font-weight: bold; color: #2980b9;">0</span> kg</p>
        </div>
    </div>

    <div class="chart-container">
        <canvas id="solarChart"></canvas>
    </div>
</div>

<script>
    // ⚠️ [중요] 여기에 아까 1단계 4번에서 복사한 본인의 Firebase 설정값을 그대로 덮어씌우세요!
    const firebaseConfig = {
        apiKey: "YOUR_API_KEY",
        authDomain: "YOUR_AUTH_DOMAIN",
        databaseURL: "YOUR_DATABASE_URL",
        projectId: "YOUR_PROJECT_ID",
        storageBucket: "YOUR_STORAGE_BUCKET",
        messagingSenderId: "YOUR_MESSAGING_SENDER_ID",
        appId: "YOUR_APP_ID"
    };
    
    // Firebase 초기화
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    // 태양광 발전량 수식 계산 및 Firebase 전송 함수
    function generateSolarData(weather, basePower) {
        // 전기공학 수식 가미: 약간의 오차(랜덤값)를 주어 자연스러운 실제 데이터처럼 가공
        const randomVariation = Math.floor(Math.random() * 20) - 10; // -10 ~ +10 사이 오차
        const finalPower = Math.max(5, basePower + randomVariation); // 발전량이 0 이하로 내려가지 않게 설정
        
        // 데이터 구조화하여 Firebase Realtime Database에 Push (실시간 축적)
        database.ref('solar_logs/').push({
            weather: weather,
            power: finalPower,
            timestamp: new Date().toLocaleTimeString()
        });
    }

    // Chart.js 그래프 설정
    const ctx = document.getElementById('solarChart').getContext('2d');
    const solarChart = new Chart(ctx, {
        type: 'line',
        data: {
            labels: [], // 시간 데이터가 들어갈 곳
            datasets: [{
                label: '실시간 태양광 발전량 (kWh)',
                data: [], // 발전량 숫자가 들어갈 곳
                borderColor: '#e67e22',
                backgroundColor: 'rgba(230, 126, 34, 0.1)',
                borderWidth: 3,
                fill: true,
                tension: 0.3
            }]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            scales: { y: { beginAtZero: true } }
        }
    });

    // Firebase로부터 실시간 데이터 갱신 감지 (데이터 분석 및 시각화 반영)
    database.ref('solar_logs/').on('value', (snapshot) => {
        const data = snapshot.val();
        if (!data) return;

        const labels = [];
        const chartData = [];
        let totalPower = 0;
        let count = 0;

        // 빅데이터 가공 프로세스
        Object.keys(data).forEach((key) => {
            const log = data[key];
            labels.push(log.timestamp);
            chartData.push(log.power);
            totalPower += log.power;
            count++;
        });

        // 그래프 업데이트
        solarChart.data.labels = labels;
        solarChart.data.datasets[0].data = chartData;
        solarChart.update();

        // 전기 및 환경 공학 데이터 분석 통계치 계산
        // 대한민국 전력 배출계수 기준: 1kWh 생산당 약 0.45kg의 CO2 발생 절감 효과
        const totalCo2Saved = (totalPower * 0.45).toFixed(2);

        // 화면에 결과 반영
        document.getElementById('total-count').innerText = count;
        document.getElementById('total-power').innerText = totalPower;
        document.getElementById('total-co2').innerText = totalCo2Saved;
    });
</script>

</body>
</html>
