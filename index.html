<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Firebase 로그인 데이터 관리</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: linear-gradient(135deg, #e3f2fd, #fce4ec);
      font-family: Arial, sans-serif;
      color: #333;
    }

    .container {
      width: min(900px, 92%);
      margin: 40px auto;
      background: #ffffff;
      border-radius: 24px;
      padding: 28px;
      box-shadow: 0 15px 35px rgba(0, 0, 0, 0.16);
    }

    h1 {
      margin: 0 0 8px;
      text-align: center;
      font-size: 28px;
    }

    h2 {
      margin-top: 0;
      font-size: 22px;
    }

    .subtitle {
      text-align: center;
      color: #777;
      margin-bottom: 28px;
      font-size: 14px;
    }

    .auth-box {
      max-width: 420px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    input {
      height: 46px;
      padding: 0 14px;
      border: 1px solid #ddd;
      border-radius: 12px;
      font-size: 15px;
      outline: none;
    }

    input:focus {
      border-color: #42a5f5;
      box-shadow: 0 0 0 3px rgba(66, 165, 245, 0.15);
    }

    button {
      border: none;
      border-radius: 12px;
      padding: 0 16px;
      height: 46px;
      font-size: 15px;
      cursor: pointer;
      transition: 0.15s;
      font-weight: bold;
    }

    button:hover {
      transform: translateY(-2px);
      opacity: 0.9;
    }

    .login-btn {
      background: #42a5f5;
      color: white;
    }

    .signup-btn {
      background: #7e57c2;
      color: white;
    }

    .logout-btn {
      background: #455a64;
      color: white;
    }

    .add-btn {
      background: #42a5f5;
      color: white;
    }

    .refresh-btn {
      background: #66bb6a;
      color: white;
      margin-bottom: 16px;
    }

    .edit-btn {
      background: #ffca28;
      color: #333;
    }

    .delete-btn {
      background: #ef5350;
      color: white;
    }

    .save-btn {
      background: #7e57c2;
      color: white;
    }

    .cancel-btn {
      background: #b0bec5;
      color: white;
    }

    .form-box {
      display: grid;
      grid-template-columns: 1fr 2fr auto;
      gap: 10px;
      margin-bottom: 22px;
    }

    .top-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 22px;
      padding: 14px;
      border-radius: 16px;
      background: #f7f9fb;
    }

    .user-info {
      font-size: 14px;
      color: #555;
      word-break: break-all;
    }

    .status {
      min-height: 24px;
      margin-bottom: 14px;
      color: #e53935; /* 오류 가시성을 위해 색상 강조 */
      font-size: 14px;
      font-weight: bold;
      text-align: center;
    }

    .list {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .item {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 12px;
      align-items: center;
      padding: 16px;
      border-radius: 16px;
      background: #f7f9fb;
      border: 1px solid #edf1f5;
    }

    .item-title {
      margin: 0 0 6px;
      font-size: 18px;
      font-weight: bold;
    }

    .item-content {
      margin: 0;
      color: #555;
      line-height: 1.5;
      word-break: break-all;
    }

    .item-date {
      margin-top: 8px;
      font-size: 12px;
      color: #999;
    }

    .item-actions {
      display: flex;
      gap: 8px;
    }

    .edit-box {
      display: grid;
      grid-template-columns: 1fr 2fr auto auto;
      gap: 8px;
      width: 100%;
    }

    .empty {
      text-align: center;
      padding: 30px;
      color: #888;
      background: #f7f9fb;
      border-radius: 16px;
    }

    .hidden {
      display: none;
    }

    .notice {
      max-width: 620px;
      margin: 20px auto 0;
      padding: 14px;
      border-radius: 14px;
      background: #fff8e1;
      color: #6d4c41;
      font-size: 14px;
      line-height: 1.6;
    }

    @media (max-width: 700px) {
      .form-box,
      .item,
      .edit-box,
      .top-bar {
        grid-template-columns: 1fr;
        flex-direction: column;
        align-items: stretch;
      }

      .item-actions {
        justify-content: flex-end;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Firebase 로그인 데이터 관리</h1>
    <div class="subtitle">Firebase Authentication + Realtime Database 구조 시뮬레이션</div>

    <section id="authSection">
      <div class="auth-box">
        <h2>로그인 / 회원가입</h2>
        <input id="emailInput" type="email" placeholder="이메일" />
        <input id="passwordInput" type="password" placeholder="비밀번호 6자리 이상" />
        <button class="login-btn" id="loginBtn">로그인</button>
        <button class="signup-btn" id="signupBtn">회원가입</button>
      </div>

      <div class="notice">
        처음 사용하는 이메일은 회원가입을 먼저 누르세요.<br />
        이미 가입한 이메일은 로그인 버튼을 누르면 됩니다.
      </div>
    </section>

    <section id="mainSection" class="hidden">
      <div class="top-bar">
        <div class="user-info">
          로그인 계정: <strong id="userEmail"></strong>
        </div>
        <button class="logout-btn" id="logoutBtn">로그아웃</button>
      </div>

      <div class="form-box">
        <input id="titleInput" type="text" placeholder="제목 입력" />
        <input id="contentInput" type="text" placeholder="내용 입력" />
        <button class="add-btn" id="addBtn">추가</button>
      </div>

      <button class="refresh-btn" id="refreshBtn">데이터 새로고침</button>
      <div id="status" class="status"></div>
      <div id="dataList" class="list"></div>
    </section>
  </div>

  <script>
    // --- 고신뢰성 가상 파이어베이스 스토리지 인프라 엔진 초기화 ---
    if (!localStorage.getItem('fb_auth_users')) {
      localStorage.setItem('fb_auth_users', JSON.stringify({}));
    }
    if (!localStorage.getItem('fb_rtdb_data')) {
      localStorage.setItem('fb_rtdb_data', JSON.stringify({}));
    }

    const authSection = document.getElementById('authSection');
    const mainSection = document.getElementById('mainSection');

    const emailInput = document.getElementById('emailInput');
    const passwordInput = document.getElementById('passwordInput');
    const loginBtn = document.getElementById('loginBtn');
    const signupBtn = document.getElementById('signupBtn');
    const logoutBtn = document.getElementById('logoutBtn');

    const userEmail = document.getElementById('userEmail');
    const titleInput = document.getElementById('titleInput');
    const contentInput = document.getElementById('contentInput');
    const addBtn = document.getElementById('addBtn');
    const refreshBtn = document.getElementById('refreshBtn');
    const dataList = document.getElementById('dataList');
    const statusBox = document.getElementById('status');

    let currentUserEmail = null;

    function setStatus(message, isError = false) {
      statusBox.style.color = isError ? '#e53935' : '#2e7d32';
      statusBox.textContent = message;
    }

    function getStorageData(key) {
      return JSON.parse(localStorage.getItem(key)) || {};
    }

    function saveStorageData(key, data) {
      localStorage.setItem(key, JSON.stringify(data));
    }

    function getEmailAndPassword() {
      const email = emailInput.value.trim();
      const password = passwordInput.value.trim();

      if (!email || !password) {
        alert('이메일과 비밀번호를 모두 입력해주세요.');
        return null;
      }

      if (password.length < 6) {
        alert('비밀번호는 6자리 이상이어야 합니다.');
        return null;
      }

      return { email, password };
    }

    // [회원가입 기능]
    signupBtn.addEventListener('click', () => {
      const account = getEmailAndPassword();
      if (!account) return;

      const users = getStorageData('fb_auth_users');
      if (users[account.email]) {
        alert('이미 가입된 이메일입니다.');
        return;
      }

      // 유저 데이터 계정 생성 및 할당
      users[account.email] = { password: account.password };
      saveStorageData('fb_auth_users', users);
      
      alert('회원가입이 완료되었습니다. 로그인 버튼을 눌러주세요.');
    });

    // [로그인 기능]
    loginBtn.addEventListener('click', () => {
      const account = getEmailAndPassword();
      if (!account) return;

      const users = getStorageData('fb_auth_users');
      if (users[account.email] && users[account.email].password === account.password) {
        currentUserEmail = account.email;
        showMainPage(account.email);
        startRealtimeDataListener(account.email);
      } else {
        alert('이메일 또는 비밀번호가 올바르지 않습니다.');
      }
    });

    // [로그아웃 기능]
    logoutBtn.addEventListener('click', () => {
      currentUserEmail = null;
      showAuthPage();
    });

    function showMainPage(email) {
      authSection.classList.add('hidden');
      mainSection.classList.remove('hidden');
      userEmail.textContent = email;
      emailInput.value = '';
      passwordInput.value = '';
    }

    function showAuthPage() {
      authSection.classList.remove('hidden');
      mainSection.classList.add('hidden');
      userEmail.textContent = '';
      dataList.innerHTML = '';
    }

    // [데이터 동기화 및 조회]
    function startRealtimeDataListener(email) {
      setStatus('데이터를 불러오는 중입니다...');
      setTimeout(() => {
        const db = getStorageData('fb_rtdb_data');
        const userLogs = db[email] || {};
        renderData(userLogs);
        setStatus('데이터가 실시간으로 동기화되었습니다.');
      }, 300);
    }

    refreshBtn.addEventListener('click', () => {
      if (currentUserEmail) {
        startRealtimeDataListener(currentUserEmail);
      }
    });

    // [데이터 추가 - Create]
    addBtn.addEventListener('click', addData);

    function addData() {
      if (!currentUserEmail) {
        alert('로그인이 필요합니다.');
        return;
      }

      const title = titleInput.value.trim();
      const content = contentInput.value.trim();

      if (!title || !content) {
        alert('제목과 내용을 모두 입력해주세요.');
        return;
      }

      const db = getStorageData('fb_rtdb_data');
      if (!db[currentUserEmail]) db[currentUserEmail] = {};

      // 고유 아이디 키값 난수 생성기
      const newId = 'id_' + Math.random().toString(36).substr(2, 9);
      db[currentUserEmail][newId] = {
        title: title,
        content: content,
        createdAt: new Date().toLocaleString('ko-KR'),
        updatedAt: ''
      };

      saveStorageData('fb_rtdb_data', db);
      titleInput.value = '';
      contentInput.value = '';
      startRealtimeDataListener(currentUserEmail);
    }

    // [데이터 삭제 - Delete]
    window.deleteData = function(id) {
      if (!currentUserEmail) return;

      const isConfirmed = confirm('정말 삭제하시겠습니까?');
      if (!isConfirmed) return;

      const db = getStorageData('fb_rtdb_data');
      if (db[currentUserEmail] && db[currentUserEmail][id]) {
        delete db[currentUserEmail][id];
        saveStorageData('fb_rtdb_data', db);
        startRealtimeDataListener(currentUserEmail);
      }
    };

    // [데이터 수정 - Update]
    window.updateData = function(id) {
      if (!currentUserEmail) return;

      const editTitle = document.getElementById(`edit-title-${id}`).value.trim();
      const editContent = document.getElementById(`edit-content-${id}`).value.trim();

      if (!editTitle || !editContent) {
        alert('수정할 제목과 내용을 모두 입력해주세요.');
        return;
      }

      const db = getStorageData('fb_rtdb_data');
      if (db[currentUserEmail] && db[currentUserEmail][id]) {
        db[currentUserEmail][id].title = editTitle;
        db[currentUserEmail][id].content = editContent;
        db[currentUserEmail][id].updatedAt = new Date().toLocaleString('ko-KR');
        
        saveStorageData('fb_rtdb_data', db);
        startRealtimeDataListener(currentUserEmail);
      }
    };

    // UI에 데이터 출력 렌더러
    function renderData(data) {
      dataList.innerHTML = '';

      if (!data || Object.keys(data).length === 0) {
        dataList.innerHTML = '<div class="empty">아직 저장된 데이터가 없습니다.</div>';
        return;
      }

      const entries = Object.entries(data).reverse();

      entries.forEach(([id, item]) => {
        const div = document.createElement('div');
        div.className = 'item';
        div.id = `item-${id}`;

        div.innerHTML = `
          <div>
            <p class="item-title">${escapeHTML(item.title || '')}</p>
            <p class="item-content">${escapeHTML(item.content || '')}</p>
            <div class="item-date">
              생성: ${item.createdAt || '-'}
              ${item.updatedAt ? ` / 수정: ${item.updatedAt}` : ''}
            </div>
          </div>
          <div class="item-actions">
            <button class="edit-btn" onclick="showEditForm('${id}')">수정</button>
            <button class="delete-btn" onclick="deleteData('${id}')">삭제</button>
          </div>
        `;

        dataList.appendChild(div);
      });
    }

    // 수정 창 레이아웃 출력 토글 함수
    window.showEditForm = function(id) {
      const db = getStorageData('fb_rtdb_data');
      if(!db[currentUserEmail] || !db[currentUserEmail][id]) return;
      
      const item = db[currentUserEmail][id];
      const itemBox = document.getElementById(`item-${id}`);

      itemBox.innerHTML = `
        <div class="edit-box">
          <input id="edit-title-${id}" type="text" value="${escapeHTML(item.title)}" />
          <input id="edit-content-${id}" type="text" value="${escapeHTML(item.content)}" />
          <button class="save-btn" onclick="updateData('${id}')">저장</button>
          <button class="cancel-btn" onclick="abortEdit()">취소</button>
        </div>
      `;
    };

    window.abortEdit = function() {
      if(currentUserEmail) startRealtimeDataListener(currentUserEmail);
    };

    function escapeHTML(text) {
      return String(text)
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#039;');
    }

    // 엔터 키 바인딩 단축키 제어
    document.addEventListener('keydown', function(event) {
      if (event.key !== 'Enter') return;

      const activeId = document.activeElement.id;

      if (activeId === 'emailInput' || activeId === 'passwordInput') {
        loginBtn.click();
      }

      if (activeId === 'titleInput' || activeId === 'contentInput') {
        addBtn.click();
      }
    });
  </script>
</body>
</html>
